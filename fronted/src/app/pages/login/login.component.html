<div class="parent">

  <div class="card shadow auth-card">
<div class="card-body p-4">

<h3 class="text-center mb-4">
<i class="fa-solid fa-building"></i> Mess Management
</h3>

<!-- Tabs -->
<ul class="nav nav-pills nav-justified mb-3" id="authTabs">
<li class="nav-item">
<button class="nav-link active" data-bs-toggle="pill" data-bs-target="#login">
<i class="fa-solid fa-right-to-bracket"></i> Login
</button>
</li>
<li class="nav-item">
<button class="nav-link" data-bs-toggle="pill" data-bs-target="#register">
<i class="fa-solid fa-user-plus"></i> Register
</button>
</li>
</ul>

<div class="tab-content">

<!-- LOGIN FORM -->
<div class="tab-pane fade show active" id="login">

<form>

<div class="mb-3">
<label class="form-label">username</label>
<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
<input name="username" [(ngModel)]="Log.username" type="text" class="form-control" placeholder="student@school.com">
</div>
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
<input name="password" [(ngModel)]="Log.password" type="password" class="form-control" placeholder="Enter password">
</div>
</div>

<div class="mb-3">
<label class="form-label">Select Language</label>
<select class="form-select">
<option>English</option>
<option>Hindi</option>
<option>Spanish</option>
</select>
</div>

<button class="btn btn-primary w-100 mb-2" (click)="onLog()">
<i class="fa-solid fa-arrow-right-to-bracket"></i> Login
</button>

<div class="text-center">
<a href="#" class="text-decoration-none">Forgot Password?</a> |
<a href="#" class="text-decoration-none">Contact Us</a>
</div>

</form>

</div>

<!-- REGISTER FORM -->
<div class="tab-pane fade" id="register">

<form>

<div class="mb-3">
<label class="form-label">Username</label>
<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-user"></i></span>
<input name="username" [(ngModel)]="loginonj.username" type="text" class="form-control" placeholder="Enter full name">
</div>
</div>

<div class="mb-3">
<label class="form-label">Email ID</label>
<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
<input name="email" [(ngModel)]="loginonj.email" type="email" class="form-control" placeholder="Enter email">
</div>
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
<input name="password" [(ngModel)]="loginonj.password" type="password" class="form-control" placeholder="Create password">
</div>
</div>

<div class="mb-3">

<label class="form-label">Select Role</label>
<select [(ngModel)]="loginonj.role" name="role">

<option value="">Select Role</option>
<option value="admin">Admin</option>
<option value="manager">Manager</option>
<option value="user">User</option>

</select>
</div>

<button (click)="onRegister()" class="btn btn-success w-100">
<i class="fa-solid fa-user-check"></i> Register
</button>

</form>

</div>

</div>

</div>
</div>
</div>
